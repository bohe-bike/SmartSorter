name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem "src-tauri/target/release/bundle" -Recurse | Select-Object FullName, Length

      - name: Generate latest.json
        shell: pwsh
        env:
          HAS_SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if ($env:HAS_SIGN_KEY -ne 'true') {
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY is not set — skipping latest.json (auto-update will not work)"
            exit 0
          }

          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $repo = "${{ github.repository }}"
          $bundleDir = "src-tauri/target/release/bundle"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $nsisZip = Get-ChildItem "$bundleDir/nsis/*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisZip) { Write-Warning "Signed NSIS zip not found, skipping latest.json"; exit 0 }
          $nsisSig = Get-Item "$($nsisZip.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $nsisSig) { Write-Warning "Signature .sig file not found, skipping latest.json"; exit 0 }

          $sig = (Get-Content $nsisSig.FullName -Raw).Trim()
          $manifest = [ordered]@{
            version  = $version
            notes    = "https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = "https://github.com/$repo/releases/download/$tag/$($nsisZip.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json for $version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartSorter ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi
            latest.json
