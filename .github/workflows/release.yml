name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle"
          
          # 查找产物
          $exe = "src-tauri/target/release/SmartSorter.exe"
          $msi = Get-ChildItem "$bundleDir/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsis = Get-ChildItem "$bundleDir/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          $files = @()
          if (Test-Path $exe) { $files += $exe }
          if ($msi)  { $files += $msi.FullName }
          if ($nsis) { $files += $nsis.FullName }
          
          echo "files=$($files -join ',')" >> $env:GITHUB_OUTPUT
          Write-Host "Release artifacts: $($files -join ', ')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartSorter ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/SmartSorter.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
