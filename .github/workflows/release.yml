name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build (frontend + Tauri)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $repo = "${{ github.repository }}"
          $bundleDir = "src-tauri/target/release/bundle"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $nsisZip = Get-ChildItem "$bundleDir/nsis/*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisZip) { Write-Error "Signed NSIS zip not found"; exit 1 }
          $nsisSig = Get-Item "$($nsisZip.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $nsisSig) { Write-Error "Signature file not found (is TAURI_SIGNING_PRIVATE_KEY set?)"; exit 1 }

          $sig = (Get-Content $nsisSig.FullName -Raw).Trim()
          $manifest = [ordered]@{
            version  = $version
            notes    = "https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = "https://github.com/$repo/releases/download/$tag/$($nsisZip.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json for $version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartSorter ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi
            latest.json
