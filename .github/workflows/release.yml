name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem "src-tauri/target/release/bundle" -Recurse | Select-Object FullName, Length

      - name: Generate latest.json
        shell: pwsh
        env:
          HAS_SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if ($env:HAS_SIGN_KEY -ne 'true') {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is not set. latest.json cannot be generated and auto-update will not work."
            exit 1
          }

          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $repo = "${{ github.repository }}"
          ./scripts/generate-latest-json.ps1 `
            -Version $version `
            -Tag $tag `
            -Repository $repo `
            -BundleDir "src-tauri/target/release/bundle" `
            -OutputPath "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartSorter ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            latest.json
